name: Release Notify Telegram
on:
  release:
    types: [published] # 仅正式发布Release触发

jobs:
  send_tg:
    runs-on: ubuntu-latest
    steps:
      - name: Send Release Message
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          parse_mode: Markdown
          message: |
            🚀 **新版本发布！**
            版本标签：`${{ github.event.release.tag_name }}`
            标题：${{ github.event.release.name }}
            更新日志：
            ${{ github.event.release.body }}
            下载地址：${{ github.event.release.html_url }}
